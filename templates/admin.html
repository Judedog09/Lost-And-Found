<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <div class="nav-brand"><i class="fa-solid fa-box-open"></i> Campus Finder</div>
        <div class="nav-links">
            <a href="/"><i class="fa-solid fa-magnifying-glass"></i> Search</a>
            <a href="/admin" class="active"><i class="fa-solid fa-shield-halved"></i> Admin</a>
        </div>
    </nav>

    <div class="container admin-layout">
        
        <div class="panel">
            <h2><i class="fa-solid fa-cloud-arrow-up"></i> Log New Item</h2>
            <form id="adminForm">
                <div class="form-group">
                    <label>Item Name</label>
                    <input type="text" id="name" placeholder="e.g., Apple AirPods" required>
                </div>
                <div class="form-group">
                    <label>Detailed Description</label>
                    <textarea id="desc" rows="4" placeholder="Mention color, brand, distinct marks..." required></textarea>
                </div>
                <div class="form-group">
                    <label>Storage Location</label>
                    <input type="text" id="loc" placeholder="e.g., Front Desk Bin A" required>
                </div>
                <button type="submit" class="btn btn-primary"><i class="fa-solid fa-plus"></i> Add to Database</button>
            </form>
        </div>

        <div class="panel">
            <h2><i class="fa-solid fa-boxes-stacked"></i> Current Inventory</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Item Name</th>
                            <th>Location</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-table">
                        </tbody>
                </table>
            </div>
        </div>

    </div>

    <div id="toast-container"></div>

    <script>
        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fa-solid fa-check"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Fetch and Display Inventory Table
        async function loadAdminTable() {
            const response = await fetch('/api/items');
            const items = await response.json();
            const tbody = document.getElementById('inventory-table');
            
            if (items.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color: #64748b;">Database is empty.</td></tr>`;
                return;
            }

            tbody.innerHTML = items.map(item => `
                <tr>
                    <td style="font-weight: 600;">${item.name}</td>
                    <td><span style="background: #f1f5f9; padding: 4px 8px; border-radius: 4px; font-size: 0.85rem;">${item.location}</span></td>
                    <td>
                        <button class="btn btn-danger" onclick="deleteItem(${item.id})">
                            <i class="fa-solid fa-trash"></i> Remove
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // Handle Add Submission
        document.getElementById('adminForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                description: document.getElementById('desc').value,
                location: document.getElementById('loc').value
            };

            await fetch('/api/items', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            
            document.getElementById('adminForm').reset();
            showToast("Item successfully added to database!");
            loadAdminTable(); // Refresh table immediately
        };

        // Handle Deletion (When student claims item)
        async function deleteItem(id) {
            if(confirm("Are you sure? This action cannot be undone.")) {
                await fetch(`/api/items/${id}`, { method: 'DELETE' });
                showToast("Item removed from database.");
                loadAdminTable(); // Refresh table immediately
            }
        }

        // Load table on page start
        loadAdminTable();
    </script>
</body>
</html>
